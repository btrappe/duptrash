name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release with APKs'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug -PVERSION_PATCH=${{ github.run_number }} --stacktrace

      - name: Build release APK
        if: inputs.release
        run: ./gradlew assembleRelease -PVERSION_PATCH=${{ github.run_number }} --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: duptrash-debug
          path: app/build/outputs/apk/debug/duptrash-*-debug.apk
          retention-days: 30

      - name: Upload debug APK to OneDrive
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
        run: |
          # Get access token using refresh token
          TOKEN_RESPONSE=$(curl -s -X POST \
            https://login.microsoftonline.com/consumers/oauth2/v2.0/token \
            -d "client_id=${ONEDRIVE_CLIENT_ID}" \
            -d "client_secret=${ONEDRIVE_CLIENT_SECRET}" \
            -d "refresh_token=${ONEDRIVE_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" \
            -d "scope=offline_access Files.ReadWrite")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get OneDrive access token"
            echo "$TOKEN_RESPONSE" | jq .
            exit 1
          fi

          # Find the APK file
          APK_FILE=$(ls app/build/outputs/apk/debug/duptrash-*-debug.apk | head -1)
          APK_NAME=$(basename "$APK_FILE")

          # Upload to OneDrive DupTrash folder
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://graph.microsoft.com/v1.0/me/drive/root:/DupTrash/${APK_NAME}:/content" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK_FILE}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Uploaded ${APK_NAME} to OneDrive (HTTP ${HTTP_STATUS})"
          else
            echo "::error::OneDrive upload failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

      - name: Upload release APK
        if: inputs.release
        uses: actions/upload-artifact@v4
        with:
          name: duptrash-release
          path: app/build/outputs/apk/release/duptrash-*-release.apk
          retention-days: 30

  release:
    if: inputs.release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug -PVERSION_PATCH=${{ github.run_number }}

      - name: Build release APK
        run: ./gradlew assembleRelease -PVERSION_PATCH=${{ github.run_number }}

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q :app:printVersionName -PVERSION_PATCH=${{ github.run_number }})
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DupTrash ${{ steps.version.outputs.version }}"
          body: |
            ## DupTrash v${{ steps.version.outputs.version }}

            Native Android app that scans the device's photo and video library
            for byte-identical duplicates and moves the redundant copies into
            the system media trash.

            ### Install
            1. Download the APK below
            2. On your Android device: *Settings → Security → Install unknown apps* → allow your browser/file manager
            3. Open the APK file to install

            ### Built from commit
            ${{ github.sha }}
          files: |
            app/build/outputs/apk/debug/duptrash-*-debug.apk
            app/build/outputs/apk/release/duptrash-*-release.apk
          draft: false
          prerelease: false
